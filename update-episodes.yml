name: Update Episodes Data

on:
  schedule:
    - cron: '0 6 * * *'  # Runs every day at 6am UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  update-episodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch episodes from Google Apps Script
        run: |
          curl -L \
            "https://script.google.com/macros/s/AKfycbxP6bWpBz5gyQK_9camyyxOINfT3OKCNpgS1rqdM6Vd5DL7lQhI8rRF2zFa_CTtJdqn/exec" \
            -o episodes.json
          echo "Fetched episodes.json:"
          cat episodes.json | head -c 500

      - name: Validate JSON
        run: python3 -c "import json; data=json.load(open('episodes.json')); print(f'Valid JSON with {len(data)} episodes')"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add episodes.json
          git diff --staged --quiet || git commit -m "chore: update episodes data [skip ci]"
          git push
